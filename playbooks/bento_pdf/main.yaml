# @format

# Bento PDF
# Install and configure Bento PDF tools collection.
---
- name: Install and configure Bento PDF tools collection
  hosts: bento_pdf

  pre_tasks:
    - name: Gather facts
      ansible.builtin.setup:
        gather_subset:
          - default_ipv4
      tags: always

  roles:
    - role: debian-13-setup
      tags: install
    - role: debian-common
      tags: install
      vars:
        debian_common_task_list:
          - docker

  tasks:
    - name: Install and configure Bento PDF tools collection
      ansible.builtin.import_tasks: install.yaml
      tags: install

    - name: Upgrade Bento PDF tools collection
      ansible.builtin.import_tasks: upgrade.yaml
      tags: upgrade
