# @format

# Bento PDF
# Upgrade Bento PDF tools collection.
---
- name: Check if bento-pdf requires update
  become: true
  block:
    - name: Get bento-pdf version file
      ansible.builtin.slurp:
        src: "{{ docker_project_src }}/VERSION"
      register: version_file

    - name: Extract version information
      ansible.builtin.set_fact:
        bento_pdf_image_version: "{{ version_file['content'] | b64decode | trim }}"

    - name: Get latest bento-pdf container release from github
      become: false
      community.general.github_release:
        user: alam00000
        repo: bentopdf
        action: latest_release
      delegate_to: localhost
      register: bento_pdf_github_release

    - name: Extract latest bento-pdf container version
      ansible.builtin.set_fact:
        bento_pdf_latest_version: "{{ bento_pdf_github_release.tag }}"

    - name: Stop play if bento-pdf has no updates
      ansible.builtin.meta: end_play
      when: bento_pdf_image_version == bento_pdf_latest_version

- name: Take snapshot of Proxmox instance
  ansible.builtin.import_role:
    name: proxmox
    public: false
  vars:
    proxmox_task_list: snapshot
    proxmox_snapshot_name: "{{ 'pre_upgrade_' + (bento_pdf_image_version | regex_replace('[.]', '-')) }}"
    proxmox_snapshot_description: "[Ansible] Working snapshot of bento-pdf {{ bento_pdf_image_version }} before upgrading to {{ bento_pdf_latest_version }}" # noqa: yaml[line-length]
  delegate_to: localhost

- name: Upgrade bento-pdf pdf tools server
  become: true
  block:
    - name: Update apt cache, upgrade packages and remove unused dependencies
      ansible.builtin.apt:
        update_cache: true
        upgrade: dist
        autoremove: true
        purge: true

    - name: Ensure docker compose file is updated
      ansible.builtin.template:
        src: templates/app.docker-compose.yaml
        dest: "{{ docker_project_src }}/docker-compose.yaml"
        owner: "{{ debian_user_name }}"
        group: "{{ debian_user_name }}"
        mode: "0640"

    - name: Update & start bento-pdf docker containers
      become: true
      community.docker.docker_compose_v2:
        project_name: "{{ docker_project_name }}"
        project_src: "{{ docker_project_src }}"
        remove_orphans: true
        pull: always
        state: present
      register: docker_containers_updated

    - name: Prune unused docker objects
      community.docker.docker_prune:
        builder_cache_all: true
        containers: true
        images: true
        networks: true
        volumes: true

    - name: Update version file
      ansible.builtin.template:
        src: templates/app.VERSION
        dest: "{{ docker_project_src }}/VERSION"
        owner: "{{ bento_pdf_user_name }}"
        group: "{{ bento_pdf_user_name }}"
        mode: "0640"
      when: docker_containers_updated.changed
