# @format

# Bento PDF
# Install and configure Bento PDF tools collection.
---
- name: Ensure bento-pdf user is present
  become: true
  block:
    - name: Ensure bento-pdf group is present
      ansible.builtin.group:
        name: "{{ bento_pdf_user_name }}"
        gid: "{{ bento_pdf_user_id }}"
        system: true
        state: present

    - name: Ensure bento-pdf user is present
      ansible.builtin.user:
        name: "{{ bento_pdf_user_name }}"
        group: "{{ bento_pdf_user_name }}"
        password: "*"
        shell: "{{ bento_pdf_user_shell }}"
        create_home: false
        uid: "{{ bento_pdf_user_id }}"
        state: present

- name: Create application directory
  become: true
  ansible.builtin.file:
    path: "{{ docker_project_src }}"
    owner: "{{ bento_pdf_user_name }}"
    group: "{{ bento_pdf_user_name }}"
    mode: "0640"
    state: directory

- name: Setup Bento PDF docker compose file
  become: true
  ansible.builtin.template:
    src: templates/app.docker-compose.yaml
    dest: "{{ docker_project_src }}/docker-compose.yaml"
    owner: "{{ bento_pdf_user_name }}"
    group: "{{ bento_pdf_user_name }}"
    mode: "0640"

- name: Install and configure nginx
  vars:
    debian_common_task_list:
      - nginx
    nginx_tls_domains:
      - "{{ ansible_host }}"
  ansible.builtin.include_role:
    name: debian-common

- name: Get latest bento-pdf container release from github
  become: false
  community.general.github_release:
    user: alam00000
    repo: bentopdf
    action: latest_release
  delegate_to: localhost
  register: bento_pdf_github_release

- name: Extract latest bento-pdf container version
  ansible.builtin.set_fact:
    bento_pdf_latest_version: "{{ bento_pdf_github_release.tag }}"

- name: Start Bento PDF docker containers
  become: true
  community.docker.docker_compose_v2:
    project_name: "{{ docker_project_name }}"
    project_src: "{{ docker_project_src }}"
    state: present
  register: docker_containers_started

- name: Set version file
  become: true
  ansible.builtin.template:
    src: templates/app.VERSION
    dest: "{{ docker_project_src }}/VERSION"
    owner: "{{ bento_pdf_user_name }}"
    group: "{{ bento_pdf_user_name }}"
    mode: "0640"
  when: docker_containers_started.changed
