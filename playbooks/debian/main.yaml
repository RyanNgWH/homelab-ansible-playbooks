# @format

# Debian
# Configure & manage Debian servers.
---
- name: Configure & manage Debian servers
  hosts: debian

  pre_tasks:
    - name: Gather facts
      ansible.builtin.setup:
        gather_subset:
          - default_ipv4
      tags: always

  roles:
    - role: debian-13-setup
      tags: install

  tasks:
    - name: Upgrade Debian servers
      ansible.builtin.import_tasks: upgrade.yaml
      tags: upgrade
